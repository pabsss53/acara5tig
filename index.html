<!DOCTYPE html>
<html>
<head>
<title>Geospatial Mashup</title>
<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script
src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
#map {
  width: 100%;
  height: 100vh;
}
</style>
</head>
<body>
<div id="map"></div>
<script>


// --- Inisialisasi Peta ---
var mymap = L.map('map').setView([-8.550125745052497, 116.36540491167659], 10);


// --- Basemap OpenStreetMap ---
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
maxZoom: 19,
attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">' +
'OpenStreetMap</a> contributors'
}).addTo(mymap);


// --- Marker (Objek Titik 1) ---
var marker = L.marker([-8.601727346559542, 116.45051521634622]).addTo(mymap);
marker.bindPopup('<b>Akses Kesehatan Medis 1</b><br>Puskesmas.');


// --- Marker (Objek Titik 2) ---
var marker = L.marker([-8.573621118152161, 116.1985841777801]).addTo(mymap);
marker.bindPopup('<b>Akses Kesehatan Medis 2</b><br>Puskesmas.');


// --- Circle (Objek Lingkaran) ---
var circle = L.circle([-8.406835008540924, 116.41061179787374], {
color: '#FF1493', fillColor: '#FFC0CB',
fillOpacity: 0.5, radius: 20000
}).addTo(mymap);
circle.bindPopup('Zona Bahaya Radius 20000 m dari titik ini.');


// --- Polygon (Objek Area) ---
var polygon = L.polygon([
  [-8.575000778293003, 116.1659217173297],

  [-8.616160131125156, 116.1341794575452],

</body>
</html>
